syntax = "proto3";

package foodordering.cart.v1;

//  Documentation §3.2 Cart Service gRPC APIs

service CartService {
  rpc GetCart (GetCartRequest) returns (Cart);
  rpc AddItem (AddItemRequest) returns (Cart);
  rpc UpdateItem (UpdateItemRequest) returns (Cart);
  rpc RemoveItem (RemoveItemRequest) returns (Cart);
  rpc ClearCart (ClearCartRequest) returns (Cart);
  rpc PriceCart (PriceCartRequest) returns (Cart);
}

message GetCartRequest {
  string user_id = 1;
}

message AddItemRequest {
  string user_id = 1;
  string product_id = 2;
  string variant_id = 3;
  int32 quantity = 4;
}

message UpdateItemRequest {
  string user_id = 1;
  string product_id = 2;
  string variant_id = 3;
  int32 quantity = 4;
}

message RemoveItemRequest {
  string user_id = 1;
  string product_id = 2;
  string variant_id = 3;
}

message ClearCartRequest {
  string user_id = 1;
}

message PriceCartRequest {
  string user_id = 1;
}

message CartItem {
  string product_id = 1;
  string variant_id = 2;
  string label = 3;
  string unit_price = 4;
  int32 quantity = 5;
}

message Cart {
  string user_id = 1;
  repeated CartItem items = 2;
  string total = 3;
  int32 item_count = 4;
}
