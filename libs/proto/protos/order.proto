syntax = "proto3";

package foodordering.order.v1;

//  Documentation §3.2 Order Service gRPC APIs
// CancelOrder: customer (own, pending) or admin (cancel + soft-delete) — Q3

service OrderService {
  rpc PlaceOrder (PlaceOrderRequest) returns (PlaceOrderResponse);
  rpc GetOrder (GetOrderRequest) returns (Order);
  rpc ListMyOrders (ListMyOrdersRequest) returns (ListMyOrdersResponse);
  rpc ListOrders (ListOrdersRequest) returns (ListMyOrdersResponse);
  rpc CancelOrder (CancelOrderRequest) returns (Order);
}

message PlaceOrderRequest {
  string user_id = 1;
  string payment_type = 2;
  string idempotency_key = 3;
}

message PlaceOrderResponse {
  string order_id = 1;
  string status = 2;
  string total = 3;
}

message GetOrderRequest {
  string order_id = 1;
  string user_id = 2;
  bool as_admin = 3;
}

message ListMyOrdersRequest {
  string user_id = 1;
  int32 page = 2;
  int32 limit = 3;
}

message ListMyOrdersResponse {
  repeated OrderSummary orders = 1;
  int32 page = 2;
  int32 limit = 3;
  int32 total = 4;
}

message ListOrdersRequest {
  int32 page = 1;
  int32 limit = 2;
  bool as_admin = 3;
}

message CancelOrderRequest {
  string order_id = 1;
  string user_id = 2;
  bool as_admin = 3;
}

message OrderItem {
  string id = 1;
  string variant_id = 2;
  string product_name_snapshot = 3;
  string variant_label_snapshot = 4;
  string unit_price_snapshot = 5;
  int32 quantity = 6;
}

message OrderStatusHistoryEntry {
  string id = 1;
  string status = 2;
  string at = 3;
}

message Order {
  string id = 1;
  string user_id = 2;
  string total = 3;
  string payment_type = 4;
  string status = 5;
  string created_at = 6;
  bool soft_deleted = 7;
  repeated OrderItem items = 8;
  repeated OrderStatusHistoryEntry status_history = 9;
}

message OrderSummary {
  string id = 1;
  string total = 2;
  string status = 3;
  string payment_type = 4;
  string created_at = 5;
  int32 item_count = 6;
  string user_id = 7;
}
