#  Documentation §12 — scrape golden signals from local services
global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: gateway
    static_configs:
      - targets: ["host.docker.internal:3001"]
  - job_name: identity
    static_configs:
      - targets: ["host.docker.internal:3002"]
  - job_name: catalog
    static_configs:
      - targets: ["host.docker.internal:3003"]
  - job_name: cart
    static_configs:
      - targets: ["host.docker.internal:3004"]
  - job_name: order
    static_configs:
      - targets: ["host.docker.internal:3005"]
  - job_name: notification
    static_configs:
      - targets: ["host.docker.internal:3006"]
  - job_name: realtime
    static_configs:
      - targets: ["host.docker.internal:3007"]
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
